<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="64" y1="12" x2="64" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Shield Border Gradient -->
    <linearGradient id="shieldGrad" x1="16" y1="12" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Code Brackets Gradient -->
    <linearGradient id="codeGrad" x1="34" y1="50" x2="94" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Glowing Checkmark Gradient -->
    <linearGradient id="checkGrad" x1="52" y1="54" x2="76" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Glow Filter for Code -->
    <filter id="glow-code" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glow Filter for Checkmark -->
    <filter id="glow-check" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glow Filter for Shield Outer -->
    <filter id="glow-shield" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Shield Shadow / Glow -->
  <path d="M 64,12 L 112,28 L 112,68 C 112,96 92,114 64,120 C 36,114 16,96 16,68 L 16,28 Z" 
        fill="url(#bgGrad)" 
        stroke="url(#shieldGrad)" 
        stroke-width="5" 
        stroke-linejoin="round"
        filter="url(#glow-shield)" />

  <!-- Concentric Inner Shield Guideline for Tech Aesthetic -->
  <path d="M 64,22 L 102,35 L 102,68 C 102,90 86,104 64,109 C 42,104 26,90 26,68 L 26,35 Z" 
        fill="none" 
        stroke="#1e293b" 
        stroke-width="1.5" 
        stroke-dasharray="4 3" />

  <!-- Code Bracket (Left) -->
  <path d="M 46,50 L 34,64 L 46,78" 
        fill="none" 
        stroke="url(#codeGrad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow-code)" />

  <!-- Code Bracket (Right) -->
  <path d="M 82,50 L 94,64 L 82,78" 
        fill="none" 
        stroke="url(#codeGrad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow-code)" />

  <!-- Central Successful Audit Checkmark -->
  <path d="M 52,66 L 61,74 L 76,54" 
        fill="none" 
        stroke="url(#checkGrad)" 
        stroke-width="6.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow-check)" />
</svg>